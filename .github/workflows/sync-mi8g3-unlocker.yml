name: 同步 Mi8G3-Unlocker Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 同步 Release
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: Linuxoid-cn/Mi8G3-Unlocker
          TARGET_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p dist

          TAG=$(gh release view \
            --repo "$UPSTREAM_REPO" \
            --json tagName \
            --jq '.tagName')

          NAME=$(gh release view \
            --repo "$UPSTREAM_REPO" \
            --json name \
            --jq '.name // .tagName')

          gh release delete "$TAG" \
            --repo "$TARGET_REPO" \
            --yes 2>/dev/null || true

          gh release view \
            --repo "$UPSTREAM_REPO" \
            --json assets \
            --jq '.assets[] | [.name,.url] | @tsv' |
          while IFS=$'\t' read -r FILE URL; do
            gh api "$URL" \
              -H "Accept: application/octet-stream" \
              > "dist/$FILE"
          done

          gh release create "$TAG" dist/* \
            --repo "$TARGET_REPO" \
            --title "$NAME" \
            --notes "Auto Sync"
